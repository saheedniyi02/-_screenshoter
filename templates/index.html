<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- font awesome API -->
  <link rel="icon" href="{{url_for("static",filename="bot-head.png")}}">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="{{url_for("static",filename="index.css")}}">
  <link rel="icon" href="{{url_for("static",filename="tab-icon.png")}}">
  <title>Tweets Screenshoter app</title>
</head>

<body>
  <nav>
    <div class="menu">
      <div class="burger">
        <i class="fa-solid fa-bars"></i>
      </div>
    </div>
    <div class="logo">
      <img src="{{url_for("static",filename="bot-head.png")}}" alt="bot-head image">
      <a href="">
        <h1>Tweets Screenshoter </h1>
      </a>
    </div>
    <div class="nav-btn">
      <a href="https://twitter.com/_screenshoter" target="_blank">Try It</a>
    </div>
  </nav>

  <header>
    <h1>
      Paste the link to the tweet in the link below
    </h1>
    <form method="post">
      <label for="link">Link</label>
      <input type="text" id="link" name="link" placeholder="paste the link to the tweet here!" required>
      <br> <br>
      <label for="Tweet or thread">Tweet or thread?</label>
      <select name="type" id="type">
        <option value="tweet">Tweet</option>
        <option value="thread">Thread</option>
      </select>
        <i class="fa fa-chevron-down" ></i>
      <br> <br>

      <label for="Color">Color</label>
      <select name="color" id="color">
        <option value="light">Light mode</option>
        <option value="dark">Dark</option>
        <option value="colorful">Colorful</option>
      </select>
      <i class="fa fa-chevron-down" ></i>

    <br> <br>
    <abbr title="download">
     <button class="download-btn" type="submit">
      <a href="/download">
        <i class="fa-solid fa-download">download</i>
      </a>
     </button>
    </abbr> 
    </form>



    <section class="how-to-use">
      <h1>How to Use.</h1>
      <p>Paste the link to the <b>tweet</b> you intend to screenshot here if you intend to screenshot a tweet, or paste the link to
        the <b>last tweet</b> in a thread if you intend to screenshot a <b>thread.</b></p>
    </section>

  </header>

  <footer>
    <a href="https://twitter.com/_screenshoter" target="_blank">
      <h1>
        <span><i class="fa-brands fa-twitter"></i> @_screenshoter</span>
      </h1>
    </a>

  </footer>
</body>

</html>
